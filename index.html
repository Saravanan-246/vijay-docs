<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vijay++ Docs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "Inter", sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* ===== LAYOUT ===== */
.app { display:flex; min-height:100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width:260px;
  background:#020617;
  border-right:1px solid #1e293b;
  padding:20px;
  overflow-y:auto;
  position:sticky;
  top:0;
  height:100vh;
}

.logo {
  font-size:20px;
  font-weight:700;
  margin-bottom:25px;
  color:#38bdf8;
}

/* MENU */
.menu button {
  width:100%;
  padding:10px 12px;
  margin-bottom:6px;
  border:none;
  background:transparent;
  color:#94a3b8;
  border-radius:8px;
  text-align:left;
  cursor:pointer;
  transition:0.2s;
}

.menu button:hover {
  background:#1e293b;
  color:white;
}

.menu button.active {
  background:#2563eb;
  color:white;
}

/* ===== MAIN ===== */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar {
  height:55px;
  display:flex;
  align-items:center;
  padding:0 20px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  font-weight:600;
  position:sticky;
  top:0;
  z-index:50;
}

.menu-btn {
  font-size:22px;
  margin-right:12px;
  cursor:pointer;
}

/* CONTENT */
.content {
  flex:1;
  overflow-y:auto;
  padding:30px;
  scroll-behavior:smooth;
}

/* SECTION */
.section {
  display:none;
  animation:fade 0.3s ease;
}
.section.active { display:block; }

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

h1 {
  margin-bottom:12px;
  font-size:28px;
}

p {
  color:#94a3b8;
  margin-bottom:12px;
  line-height:1.6;
}

/* ===== CODE ===== */
.code {
  margin-top:20px;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:12px;
  position:relative;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.code pre {
  padding:16px;
  font-family:"JetBrains Mono", monospace;
  font-size:13px;
  overflow-x:auto;
  color:#22c55e;
}

.copy-btn {
  position:absolute;
  top:10px;
  right:10px;
  background:#1e293b;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:#cbd5f5;
  cursor:pointer;
  font-size:12px;
  transition:0.2s;
}

.copy-btn:hover {
  background:#2563eb;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .sidebar {
    position:fixed;
    transform:translateX(-100%);
    height:100%;
    z-index:1000;
    transition:0.3s;
  }

  .sidebar.open {
    transform:translateX(0);
  }

  .overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:900;
  }

  .overlay.show {
    display:block;
  }

  .content {
    padding:20px;
  }
}
</style>
</head>

<body>

<div class="app">

<div id="sidebar" class="sidebar">
  <div class="logo">⚡ Vijay++ Docs</div>
  <div id="menu" class="menu"></div>
</div>

<div id="overlay" class="overlay"></div>

<div class="main">
  <div class="topbar">
    <div id="menuBtn" class="menu-btn">☰</div>
    Vijay++ Documentation
  </div>

  <div id="content" class="content"></div>
</div>

</div>

<script>

// ===== DATA =====
const sections = [

  {
    title: "Introduction",
    content: `
      <h1>Vijay++ Language</h1>
      <p>Vijay++ is a custom programming language designed for simplicity and readability.</p>
      <p>Each keyword represents a clear action, making it easy to understand program flow.</p>
    `
  },

  {
    title: "Core Keywords Overview",
    code: `Ghilli     → Start Program
Headmaster → Variable
ImWaiting  → Print Output
Solu       → Input
Mudivu     → If
Illati     → Else
Vattam     → Loop`,
    content: `<p>These are the core building blocks of Vijay++.</p>`
  },

  {
    title: "Ghilli (Start)",
    code: `Ghilli`,
    content: `
      <p><b>Meaning:</b> Start of program execution</p>
      <p><b>Behavior:</b> Interpreter begins execution from here</p>
    `
  },

  {
    title: "Headmaster (Variable)",
    code: `Headmaster x = 10
Headmaster name = "Vijay"`,
    content: `
      <p><b>Meaning:</b> Create variable</p>
      <p><b>Behavior:</b> Stores value in memory</p>
      <p><b>Types:</b> auto-detected (int, float, string, boolean)</p>
    `
  },

  {
    title: "ImWaiting (Print)",
    code: `ImWaiting x
ImWaiting "Hello"
ImWaiting "Hi " + name`,
    content: `
      <p><b>Meaning:</b> Output value</p>
      <p><b>Behavior:</b> Sends data to terminal</p>
      <p><b>Supports:</b> string + number concatenation</p>
    `
  },

  {
    title: "Solu (Input)",
    code: `Solu "Enter name: " name
Solu "Enter score: " score`,
    content: `
      <p><b>Meaning:</b> Take user input</p>
      <p><b>Behavior:</b> waits for input → stores value</p>
      <p><b>Special:</b> auto converts type</p>
    `
  },

  {
    title: "Mudivu (If)",
    code: `Mudivu x > 5 {
  ImWaiting "Big"
}`,
    content: `
      <p><b>Meaning:</b> Conditional execution</p>
      <p><b>Behavior:</b> runs block only if condition is true</p>
    `
  },

  {
    title: "Illati (Else)",
    code: `Mudivu x > 5 {
  ImWaiting "Big"
} Illati {
  ImWaiting "Small"
}`,
    content: `
      <p><b>Meaning:</b> Alternative condition</p>
      <p><b>Behavior:</b> runs when Mudivu is false</p>
    `
  },

  {
    title: "Vattam (Loop)",
    code: `Vattam 3 {
  ImWaiting "Hello"
}`,
    content: `
      <p><b>Meaning:</b> Loop / repetition</p>
      <p><b>Behavior:</b> executes block multiple times</p>
    `
  },

  {
    title: "Operators",
    code: `Arithmetic:
+  -  *  /

Comparison:
>  <  ==  !=  >=  <=

Logical:
AND  OR`,
    content: `
      <p><b>Meaning:</b> Perform operations</p>
      <p><b>Usage:</b> used in expressions and conditions</p>
    `
  },

  {
    title: "Data Types",
    code: `10 → int
3.14 → float
"Hello" → string
true → boolean`,
    content: `
      <p><b>Behavior:</b> Types automatically detected</p>
      <p>No manual declaration needed</p>
    `
  },

  {
    title: "Expression Behavior",
    code: `ImWaiting 10 + 5
ImWaiting "Hi " + name`,
    content: `
      <p>Supports arithmetic and string operations</p>
      <p>Handles mixed types automatically</p>
    `
  },

  {
    title: "Comments",
    code: `// This is a comment`,
    content: `
      <p><b>Meaning:</b> ignored by interpreter</p>
      <p>Used for explanation</p>
    `
  },

  {
    title: "Error Handling",
    code: `ImWaiting 10 / 0`,
    content: `
      <p><b>Behavior:</b> runtime errors handled safely</p>
      <p>Example: division by zero → error message</p>
    `
  },

  {
    title: "Execution Flow",
    code: `1. Code written
2. Tokenized (lexer)
3. Parsed (AST)
4. Executed
5. Output returned`,
    content: `
      <p>This is how your interpreter processes code internally</p>
    `
  },

  {
    title: "Full Example",
    code: `Ghilli

Solu "Enter name: " name
Solu "Enter score: " score

ImWaiting "Hello " + name
ImWaiting score + 10`,
    content: `
      <p>Complete program using input + output</p>

      <h3>Output</h3>
      <pre>
Enter name:
> Vijay
Enter score:
> 90
Hello Vijay
100
      </pre>
    `
  },

  {
    title: "Advanced Example",
    code: `Ghilli

Headmaster total = 0

Vattam 3 {
  total = total + 10
}

Mudivu total > 20 {
  ImWaiting "High"
} Illati {
  ImWaiting "Low"
}`,
    content: `
      <p>Combines loop, condition, and variable updates</p>
    `
  },

  {
    title: "Future (Functions)",
    code: `Sei add(a, b) {
  Thiruppu a + b
}`,
    content: `
      <p>Upcoming feature:</p>
      <ul>
        <li>Functions</li>
        <li>Return values</li>
      </ul>
    `
  }

];

// ===== MENU =====
function renderMenu(){
  const menu=document.getElementById("menu");
  sections.forEach((s,i)=>{
    const btn=document.createElement("button");
    btn.innerText=s.title;
    btn.onclick=()=>{ show(i); closeSidebar(); };
    if(i===0) btn.classList.add("active");
    menu.appendChild(btn);
  });
}

// ===== CONTENT =====
function renderContent(){
  const content=document.getElementById("content");
  sections.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="section";
    if(i===0) div.classList.add("active");

    div.innerHTML=`
      <h1>${s.title}</h1>
      ${s.content || ""}
      ${s.code ? `
        <div class="code">
          <button class="copy-btn">Copy</button>
          <pre>${escapeHTML(s.code)}</pre>
        </div>` : ""}
    `;

    content.appendChild(div);
  });

  attachCopy();
}

// ===== NAV =====
function show(i){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));

  document.querySelectorAll(".section")[i].classList.add("active");
  document.querySelectorAll(".menu button")[i].classList.add("active");

  document.querySelector(".content").scrollTop = 0;
}

// ===== COPY =====
function attachCopy(){
  document.querySelectorAll(".copy-btn").forEach(btn=>{
    btn.onclick=()=>{
      navigator.clipboard.writeText(btn.nextElementSibling.innerText);
      btn.innerText="Copied!";
      setTimeout(()=>btn.innerText="Copy",1200);
    };
  });
}

// ===== ESCAPE =====
function escapeHTML(str){
  return str.replace(/[&<>"']/g, tag => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[tag]));
}

// ===== SIDEBAR =====
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

document.getElementById("menuBtn").onclick=()=>{
  sidebar.classList.add("open");
  overlay.classList.add("show");
};

function closeSidebar(){
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
}

overlay.onclick=closeSidebar;

// ===== INIT =====
renderMenu();
renderContent();

</script>

</body>
</html>
