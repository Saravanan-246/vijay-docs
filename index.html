<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vijay++ Docs</title>

<!-- High-End Typography and Design Foundations -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ===== GLOBAL VARIABLES & THEMATIC DESIGN SYSTEM ===== */
* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
}

:root {
  --bg-main: #030712;
  --bg-sidebar: #090d16;
  --border-color: rgba(255, 255, 255, 0.06);
  --text-primary: #f3f4f6;
  --text-secondary: #9ca3af;
  --accent-primary: #38bdf8;
  --accent-hover: #2563eb;
  --code-bg: #060b13;
  --glass-bg: rgba(17, 24, 39, 0.7);
}

body {
  font-family: "Plus Jakarta Sans", sans-serif;
  background-color: var(--bg-main);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ===== APP FRAMEWORK LAYOUT ===== */
.app { 
  display: flex; 
  height: 100vh; 
  width: 100vw;
}

/* ===== MODERN SIDEBAR MATRIX ===== */
.sidebar {
  width: 280px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  height: 100%;
  flex-shrink: 0;
  z-index: 100;
}

.logo-container {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 35px;
  padding-left: 8px;
}

.logo {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.menu {
  flex: 1;
  overflow-y: auto;
  padding-right: 4px;
}

/* Customized Navigation Scrollbar */
.menu::-webkit-scrollbar {
  width: 5px;
}
.menu::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
}

.menu button {
  width: 100%;
  padding: 11px 16px;
  margin-bottom: 6px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-secondary);
  border-radius: 10px;
  text-align: left;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.menu button:hover {
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-primary);
}

.menu button.active {
  background: linear-gradient(135deg, rgba(37, 99, 235, 0.15) 0%, rgba(56, 189, 248, 0.05) 100%);
  border-color: rgba(56, 189, 248, 0.25);
  color: #38bdf8;
  box-shadow: inset 0 0 12px rgba(56, 189, 248, 0.05);
}

/* ===== MAIN CONTENT WORKSPACE ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-width: 0;
  position: relative;
}

/* STICKY TOP NAVIGATION BAR */
.topbar {
  height: 65px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  background: rgba(3, 7, 18, 0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 90;
  flex-shrink: 0;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.menu-btn {
  font-size: 24px;
  cursor: pointer;
  display: none;
  color: var(--text-secondary);
  transition: color 0.2s;
}

.menu-btn:hover {
  color: var(--text-primary);
}

.topbar-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.badge {
  background: rgba(56, 189, 248, 0.1);
  border: 1px solid rgba(56, 189, 248, 0.2);
  color: #38bdf8;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

/* CONTENT CONTAINER HUB */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 60px 40px;
  background-image: 
    radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.03) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.03) 0px, transparent 50%);
}

.content-inner {
  max-width: 820px;
  margin: 0 auto;
}

/* PERSISTENT VIEW TRANSITIONS */
.section {
  display: none;
  animation: smoothFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.section.active { 
  display: block; 
}

@keyframes smoothFade {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CORE TYPOGRAPHY PATTERNS */
h1 {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: #ffffff;
  margin-bottom: 24px;
  line-height: 1.15;
}

h2 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: #f9fafb;
  margin-top: 48px;
  margin-bottom: 20px;
}

h3 {
  font-size: 18px;
  font-weight: 600;
  color: #f3f4f6;
  margin-top: 32px;
  margin-bottom: 12px;
}

p {
  color: var(--text-secondary);
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 24px;
}

/* INLINE SYSTEM TOKENS */
:not(pre) > code {
  font-family: "JetBrains Mono", monospace;
  font-size: 14px;
  background: rgba(31, 41, 55, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: #38bdf8;
  padding: 3px 6px;
  border-radius: 6px;
}

/* PREMIUM CODESPACE INTERFACE STYLING */
.code-block {
  margin: 28px 0;
  background: var(--code-bg);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: rgba(255, 255, 255, 0.02);
  border-bottom: 1px solid var(--border-color);
}

.code-meta {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  color: #4b5563;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.code-meta::before {
  content: "";
  width: 6px;
  height: 6px;
  background: #22c55e;
  border-radius: 50%;
}

.code-block pre {
  padding: 20px 24px;
  font-family: "JetBrains Mono", monospace;
  font-size: 14px;
  line-height: 1.7;
  overflow-x: auto;
  color: #34d399;
}

.copy-btn {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 6px 14px;
  border-radius: 8px;
  color: var(--text-primary);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
}

.copy-btn:hover {
  background: var(--accent-hover);
  border-color: transparent;
  color: white;
}

/* DATA STRUCTURING MATRICES (TABLES) */
table {
  width: 100%;
  border-collapse: collapse;
  margin: 32px 0;
  font-size: 14px;
}

th {
  background: rgba(255, 255, 255, 0.02);
  color: var(--text-primary);
  font-weight: 600;
  text-align: left;
  padding: 14px 18px;
  border-bottom: 2px solid var(--border-color);
}

td {
  padding: 16px 18px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
}

tr:hover td {
  color: #ffffff;
  background: rgba(255, 255, 255, 0.01);
}

/* MARGIN & TEXT FOR BLOCK ARRAYS */
ul, ol {
  margin-left: 6px;
  margin-bottom: 32px;
  padding-left: 20px;
}

li {
  color: var(--text-secondary);
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 12px;
}

/* MOBILE INTERACTION OVERLAYS */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  display: none;
  z-index: 95;
}

/* ===== STRUCTURAL RESPONSIVE CONFIGURATIONS ===== */
@media(max-width: 900px) {
  .topbar { padding: 0 24px; }
  .content { padding: 40px 24px; }
}

@media(max-width: 768px) {
  .menu-btn { display: block; }
  
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .overlay.show {
    display: block;
  }
}
</style>
</head>

<body>

<div class="app">
  <!-- Interactive Navigation Hub Engine -->

</div>

// ===== MENU =====
function renderMenu(){
  const menu=document.getElementById("menu");
  sections.forEach((s,i)=>{
    const btn=document.createElement("button");
    btn.innerText=s.title;
    btn.onclick=()=>{ show(i); closeSidebar(); };
    if(i===0) btn.classList.add("active");
    menu.appendChild(btn);
  });
}

// ===== CONTENT =====
function renderContent(){
  const content=document.getElementById("content");
  sections.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="section";
    if(i===0) div.classList.add("active");

    div.innerHTML=`
      <h1>${s.title}</h1>
      ${s.content || ""}
      ${s.code ? `
        <div class="code">
          <button class="copy-btn">Copy</button>
          <pre>${escapeHTML(s.code)}</pre>
        </div>` : ""}
    `;

    content.appendChild(div);
  });

  attachCopy();
}

// ===== NAV =====
function show(i){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));

  document.querySelectorAll(".section")[i].classList.add("active");
  document.querySelectorAll(".menu button")[i].classList.add("active");

  document.querySelector(".content").scrollTop = 0;
}

// ===== COPY =====
function attachCopy(){
  document.querySelectorAll(".copy-btn").forEach(btn=>{
    btn.onclick=()=>{
      navigator.clipboard.writeText(btn.nextElementSibling.innerText);
      btn.innerText="Copied!";
      setTimeout(()=>btn.innerText="Copy",1200);
    };
  });
}

// ===== ESCAPE =====
function escapeHTML(str){
  return str.replace(/[&<>"']/g, tag => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[tag]));
}

// ===== SIDEBAR =====
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

document.getElementById("menuBtn").onclick=()=>{
  sidebar.classList.add("open");
  overlay.classList.add("show");
};

function closeSidebar(){
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
}

overlay.onclick=closeSidebar;

// ===== INIT =====
renderMenu();
renderContent();

</script>
